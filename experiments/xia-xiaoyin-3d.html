<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>夏萧因 3D 模型实验</title>
    <style>
      :root {
        color: #f7f3ff;
        background: #11101a;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 52% 12%, rgba(194, 173, 232, 0.28), transparent 34%),
          radial-gradient(circle at 24% 68%, rgba(215, 162, 79, 0.14), transparent 28%),
          linear-gradient(180deg, #171625 0%, #0f1018 100%);
      }

      #stage {
        width: 100vw;
        height: 100vh;
      }

      .hud {
        position: fixed;
        left: 20px;
        right: 20px;
        bottom: 18px;
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: end;
        pointer-events: none;
      }

      .hud h1 {
        margin: 0 0 6px;
        font-size: 20px;
        letter-spacing: 0;
      }

      .hud p,
      .fallback {
        max-width: 42ch;
        margin: 0;
        color: rgba(247, 243, 255, 0.72);
        font-size: 13px;
        line-height: 1.55;
      }

      .badge {
        flex: 0 0 auto;
        padding: 9px 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        color: rgba(247, 243, 255, 0.72);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px);
        font-size: 12px;
      }

      .fallback {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      .no-webgl .fallback {
        display: grid;
      }
    </style>
  </head>
  <body>
    <div id="stage" aria-label="夏萧因 3D 实验模型"></div>
    <div class="fallback">当前浏览器没有开启 WebGL，无法显示 3D 实验模型。</div>
    <div class="hud">
      <div>
        <h1>夏萧因 3D 实验模型</h1>
        <p>Three.js 原型：白发、贵族深色礼服、披风与冷调灯光。拖动屏幕可轻微旋转视角。</p>
      </div>
      <div class="badge">prototype only</div>
    </div>
    <script type="module" src="/src/three-experiment.js"></script>
  </body>
</html>
